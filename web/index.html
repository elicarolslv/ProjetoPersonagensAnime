
<html>
    <head>
        <title>Personagens Anime</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        
        <link rel="stylesheet" href="css/style.css">
    </head>
    <body>
   
        <header><h1>Personagens Favs da Eli</h1></header>
        
        <div id="cabecalhounico" >Pesquise os personagens ou anime:</div>
       
        
        <div id="pesquisar">
        <form action="PesquisaController" method="GET">
            
            <label for="anime">Anime:</label>
            <input type="text" id="anime" name="anime">

            <label for="personagem">Personagem:</label>
            <input type="text" id="personagem" name="personagem">


            <button type="submit">Pesquisar</button>
        </form>
        </div>
        
    </body>
</html>
